<script>


async function validarFormulario(){

const hotel = document.getElementById("hotel").value;
const codigo = document.getElementById("reservation").value.trim().toLowerCase();
const apellido = document.getElementById("lastname").value.trim().toLowerCase();

if(!hotel || !codigo || !apellido){
alert("Por favor completa todos los campos.");
return false;
}

try{

const response = await fetch("reservas.json");
const data = await response.json();

let encontrada = null;

for (let r of data.reservas){

if(
r.hotel === hotel &&
r.codigo.toLowerCase() === codigo &&
r.apellido.toLowerCase() === apellido
){
encontrada = r;
break;
}

}

if(encontrada){

localStorage.setItem("reservaData", JSON.stringify(encontrada));
window.location.href = "checkin.html";

}else{

alert("No se encontró la reserva");

}

}catch(error){

alert("Error cargando reservas");

}

}


</script>
